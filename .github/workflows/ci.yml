name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://erp:erp_local_dev@localhost:5432/pure_foodmart_erp
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp_local_dev
          POSTGRES_DB: pure_foodmart_erp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp -d pure_foodmart_erp"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations + seed
        run: pnpm db:migrate && pnpm db:seed

      - name: Build all workspaces
        run: pnpm build

      - name: Test all workspaces
        run: pnpm test

      - name: API boot smoke check
        run: |
          node apps/api/dist/main.js &
          API_PID=$!
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:3000/api/v1/health > /dev/null 2>&1; then
              echo "health check passed"
              kill $API_PID
              exit 0
            fi
            sleep 1
          done
          echo "API failed to become healthy" >&2
          kill $API_PID || true
          exit 1

      - name: Worker boot smoke check
        run: WORKER_RUN_ONCE=1 node apps/worker/dist/main.js

  docker-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f infra/api.Dockerfile -t pfm-api:ci .
      - name: Build worker image
        run: docker build -f infra/worker.Dockerfile -t pfm-worker:ci .
      - name: Build web image
        run: docker build -f infra/web.Dockerfile -t pfm-web:ci .
